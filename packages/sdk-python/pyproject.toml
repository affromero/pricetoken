[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "pricetoken"
version = "0.13.10"
description = "Real-time LLM pricing data — typed client, cost calculator, and static pricing"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Andres Romero", email = "me@afromero.co" }]
keywords = ["llm", "pricing", "ai", "tokens", "cost", "openai", "anthropic", "google", "xai", "mistral", "grok"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://pricetoken.ai"
Repository = "https://github.com/affromero/pricetoken"
Issues = "https://github.com/affromero/pricetoken/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/pricetoken"]

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.9", "mypy>=1.14"]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "N",    # pep8-naming
    "RUF",  # ruff-specific rules
    "PTH",  # flake8-use-pathlib
    "T20",  # flake8-print (catch stray prints)
    "TCH",  # flake8-type-checking
    "C4",   # flake8-comprehensions
    "PIE",  # flake8-pie
    "RET",  # flake8-return
    "ISC",  # flake8-implicit-str-concat
]

[tool.ruff.lint.isort]
known-first-party = ["pricetoken"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
strict = true
python_version = "3.10"

[tool.pytest.ini_options]
testpaths = ["tests"]
